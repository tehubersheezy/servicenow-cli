          - listitem [ref=f420e139]:
            - link "FAQ" [ref=f420e140] [cursor=pointer]:
              - /url: "#faq"
      - paragraph [ref=f420e141]:
        - text: "Note: This document provides detailed information about"
        - strong [ref=f420e142]: Dayvigo
        - text: Side Effects associated with lemborexant. Some dosage forms listed on this page may not apply specifically to the brand name
        - strong [ref=f420e143]: Dayvigo
        - text: .
      - paragraph [ref=f420e144]:
        - text: Applies to
        - link "lemborexant" [ref=f420e145] [cursor=pointer]:
          - /url: /mtm/lemborexant.html
        - text: ": oral tablet."
      - heading "Precautions" [level=2] [ref=f420e146]
      - paragraph [ref=f420e147]: It is very important that your doctor check your progress at regular visits to make sure this medicine is working properly and to check for unwanted effects.
      - paragraph [ref=f420e148]:
        - text: If you think you need to take lemborexant (the active ingredient contained in
        - link "Dayvigo" [ref=f420e149] [cursor=pointer]:
          - /url: /dayvigo.html
        - text: ) for more than 7 to 10 days, be sure to discuss it with your doctor.
        - link "Insomnia" [ref=f420e150] [cursor=pointer]:
          - /url: /cg/insomnia.html
        - text: that lasts longer than this may be a sign of another medical problem.
      - paragraph [ref=f420e151]:
        - text: This medicine will add to the effects of alcohol and other CNS depressants (medicines that make you drowsy or less
        - link "alert" [ref=f420e152] [cursor=pointer]:
          - /url: /mtm/alert.html
        - text: ). Some examples of CNS depressants are
        - link "antihistamines" [ref=f420e153] [cursor=pointer]:
          - /url: /drug-class/antihistamines.html
        - text: or medicine for hay
        - link "fever" [ref=f420e154] [cursor=pointer]:
          - /url: /health-guide/fever.html
        - text: ", other"
        - link "allergies" [ref=f420e155] [cursor=pointer]:
          - /url: /cg/allergies.html
        - text: ", or colds, sedatives, tranquilizers, or sleeping medicine, prescription pain medicine or"
        - link "narcotics" [ref=f420e156] [cursor=pointer]:
          - /url: /drug-class/narcotic-analgesics.html
        - text: ", medicine for seizures or"
        - link "barbiturates" [ref=f420e157] [cursor=pointer]:
          - /url: /drug-class/barbiturates.html
        - text: ","
        - link "muscle relaxants" [ref=f420e158] [cursor=pointer]:
          - /url: /drug-class/muscle-relaxants.html
        - text: ", or anesthetics, including some dental anesthetics. Check with your doctor before taking any of the above while you are using this medicine."
      - paragraph [ref=f420e159]: This medicine may cause some people, especially older persons, to become drowsy, dizzy, lightheaded, clumsy or unsteady, or less alert than they are normally, which may lead to falls, fractures, or other injuries. Even though lemborexant is taken at bedtime, it may cause some people to feel drowsy or less alert on arising. Do not drive or do anything else that could be dangerous until you know how this medicine affects you.
      - paragraph [ref=f420e160]:
        - text: If you develop any unusual and strange thoughts or behavior while you are using lemborexant, be sure to discuss it with your doctor. Some changes that have occurred in people using this medicine are like those seen in people who drink alcohol and then act in a manner that is not normal. Other changes may be more unusual and extreme, such as confusion, worsening of
        - link "depression" [ref=f420e161] [cursor=pointer]:
          - /url: /cg/depression.html
        - text: ", hallucinations (seeing, hearing, or feeling things that are not there), suicidal thoughts, and unusual excitement, nervousness, or irritability."
      - generic [ref=f420e163]: Advertisement
      - paragraph [ref=f420e164]: This medicine may cause you to do things while you are still asleep that you may not remember the next morning. You could drive a car, sleepwalk, have sex, make phone calls, or prepare and eat food while you are asleep or not fully awake. Tell your doctor right away if any of these things occur.
      - paragraph [ref=f420e165]: This medicine may cause sleep paralysis (temporary inability to move or talk for up to several minutes while you are going to sleep or wake up) or have cataplexy-like symptoms (temporary weakness in your legs). Tell your doctor right away if you have these symptoms while you are using this medicine.
      - paragraph [ref=f420e166]:
        - text: Do not take other medicines unless they have been discussed with your doctor. This includes prescription or nonprescription (over-the-counter [OTC]) medicines and herbal (eg,
        - link "St. John's wort" [ref=f420e167] [cursor=pointer]:
          - /url: /mtm/st-john-s-wort.html
        - text: ) or vitamin supplements.
      - heading "Serious side effects of Dayvigo" [level=2] [ref=f420e168]
      - paragraph [ref=f420e169]: Along with its needed effects, lemborexant may cause some unwanted effects. Although not all of these side effects may occur, if they do occur they may need medical attention.
      - paragraph [ref=f420e170]: "Check with your doctor immediately if any of the following side effects occur while taking lemborexant:"
