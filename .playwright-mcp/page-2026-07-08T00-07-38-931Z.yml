      - heading "Dayvigo Side Effects" [level=1] [ref=f420e126]
      - paragraph [ref=f420e127]: "Generic name: lemborexant"
      - paragraph [ref=f420e128]:
        - generic [ref=f420e129]:
          - text: Medically reviewed by
          - link "Philip Thornton, DipPharm" [ref=f420e130] [cursor=pointer]:
            - /url: /support/editor/9/philip-thornton-dippharm.html
          - text: . Last updated on Oct 13, 2025.
      - navigation "In page navigation" [ref=f420e131]:
        - list [ref=f420e132]:
          - listitem [ref=f420e133]:
            - link "Serious side effects" [ref=f420e134] [cursor=pointer]:
              - /url: "#serious-side-effects"
          - listitem [ref=f420e135]:
            - link "Other side effects" [ref=f420e136] [cursor=pointer]:
              - /url: "#other-side-effects"
          - listitem [ref=f420e137]:
            - link "Professional info" [ref=f420e138] [cursor=pointer]:
