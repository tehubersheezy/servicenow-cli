# Preflight: would this changelog silently ship an empty release?
#
# cargo-dist passes the release body through a GitHub Actions job output. The
# runner refuses to set any output whose value contains a masked string — and it
# masks more than your secrets. It also registers CredScan credential regexes,
# and one of them matches a bearer credential:
#
#   \bBearer + whitespace + any non-whitespace character   (case-sensitive)
#
# Measured on the runner, 2026-07-14 (.github/workflows/mask-forensics.yml in
# git history has the experiment):
#
#   MASKED                          NOT MASKED
#   "Bearer auth"                   "bearer auth"    (case-sensitive)
#   "Bearer xyzzy"                  "Bearer" alone   (needs a token after it)
#   "Bearer 123"                    "Bearer-auth"    (needs whitespace after)
#   "Bearer" \n "auth"              "Bearers auth"   (word boundary required)
#   "Authorization: Bearer abc"     "Carrier auth"
#
# Note the newline case: wrapping the phrase across two lines is NOT an escape.
#
# When the body is withheld, the plan job's `val` output arrives empty, every
# downstream job's `if` evaluates false, they all SKIP, and the workflow reports
# success while publishing a release with no assets. This emptied v0.8.0 three
# times, and was misdiagnosed for months as junk lines inside HOMEBREW_TAP_TOKEN.
# It never was: the secret is a clean single-line token and the mask persists.
#
# So stop relying on remembering the forbidden phrase. Run this before tagging
# and let the runner answer.
#
#   gh workflow run mask-check.yml --repo tehubersheezy/servicenow-cli
name: mask-check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # A multiline secret is a *separate* hazard of the same family: GitHub masks
  # each line of one, so a stray line of prose becomes a forbidden phrase
  # repo-wide. Not what bit us, but worth never finding out the hard way. A
  # secret's length and line count leak nothing.
  shape:
    runs-on: ubuntu-latest
    env:
      TAP: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: HOMEBREW_TAP_TOKEN must be a single line
        run: |
          lines=$(printf '%s' "$TAP" | grep -c '' || true)
          echo "HOMEBREW_TAP_TOKEN: ${#TAP} chars, ${lines} line(s)"
          if [ "${#TAP}" -eq 0 ]; then
            echo "::error::secret is empty"; exit 1
          fi
          if [ "$lines" -gt 1 ]; then
            echo "::error title=Multiline secret::HOMEBREW_TAP_TOKEN has ${lines} lines. Every line becomes a repo-wide mask, so any line of prose in it silently censors that phrase out of job outputs. Re-save it as a bare token."
            exit 1
          fi
          echo "single line — no prose can be hiding in it"

  emit:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.e.outputs.body }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - id: e
        name: Push the release body through a job output
        run: |
          {
            echo 'body<<MASK_EOF'
            awk '/^## /{n++} n==1' CHANGELOG.md
            echo 'MASK_EOF'
          } >> "$GITHUB_OUTPUT"

  consume:
    needs: emit
    runs-on: ubuntu-latest
    env:
      BODY: ${{ needs.emit.outputs.body }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Verdict
        run: |
          if [ -n "$BODY" ]; then
            echo "release body survived the job output ($(printf %s "$BODY" | wc -c) bytes) — safe to tag"
            exit 0
          fi

          echo "::error title=This changelog would ship an empty release::The release body was withheld as a job output. Every build job would skip and the release would publish with no assets, while the workflow reported success."

          awk '/^## /{n++} n==1' CHANGELOG.md > /tmp/body.md
          python3 - <<'PY'
          import re
          body = open("/tmp/body.md").read()
          hits = list(re.finditer(r"\bBearer\s+\S+", body))
          if hits:
              print("The runner's bearer-credential regex matches here:")
              for h in hits:
                  line = body.count("\n", 0, h.start()) + 1
                  # Break the pattern with a middle dot so the log can actually
                  # print it — otherwise the runner masks our own error message.
                  print(f"  CHANGELOG.md line {line}:  {re.sub(r'[ \t\n]+', chr(183), h.group(0))}")
              print()
              print("Rewrite it. Lowercase 'bearer' is fine, so is 'Bearer' with no word after")
              print("it. Wrapping the line is NOT a fix: the regex spans newlines.")
          else:
              print("No bearer pattern found, so some *other* masked value is in the body.")
              print("Check whether a repo secret's value (or one line of a multiline secret)")
              print("appears verbatim in the top section of CHANGELOG.md.")
          PY
          exit 1
