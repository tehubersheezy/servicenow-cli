name: Security

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/security.yml"
  schedule:
    # Daily at 06:00 UTC — catches advisories published since the last PR.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install a prebuilt cargo-audit binary rather than compiling it from
      # source (as rustsec/audit-check does) — the from-source build re-fetches
      # the crates.io index every run and was failing intermittently with HTTP2
      # framing errors. A prebuilt binary never touches the index.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  cargo-deny:
    name: cargo deny (advisories, bans, licenses, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all
