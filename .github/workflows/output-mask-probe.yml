# TEMPORARY diagnostic — delete after use.
# The v0.8.0 release plan job's output is being withheld by the runner
# ("Skip output 'val' since it may contain secret"), which skips every build
# job. This probe re-emits slices of the same dist-manifest as 24 job outputs;
# the runner's warning names exactly which slice contains the offending string.
# Dispatch with start/step to narrow: step=22 scans the whole manifest,
# step=1 pinpoints a line.
name: output-mask-probe
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "manifest = pretty-json lines; body = announcement body lines; bodyline = chars of one body line; candidates = test exact strings"
        default: "manifest"
      candidates:
        description: "candidates mode: JSON array of strings to test"
        default: "[]"
      line:
        description: "bodyline mode: which body line to char-bisect"
        default: "0"
      start:
        description: "first unit (0-based)"
        default: "0"
      step:
        description: "units per output slice"
        default: "22"

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MODE: ${{ inputs.mode }}
      LINE: ${{ inputs.line }}
      CANDIDATES: ${{ inputs.candidates }}
      START: ${{ inputs.start }}
      STEP: ${{ inputs.step }}
    outputs:
      o00: ${{ steps.p.outputs.o00 }}
      o01: ${{ steps.p.outputs.o01 }}
      o02: ${{ steps.p.outputs.o02 }}
      o03: ${{ steps.p.outputs.o03 }}
      o04: ${{ steps.p.outputs.o04 }}
      o05: ${{ steps.p.outputs.o05 }}
      o06: ${{ steps.p.outputs.o06 }}
      o07: ${{ steps.p.outputs.o07 }}
      o08: ${{ steps.p.outputs.o08 }}
      o09: ${{ steps.p.outputs.o09 }}
      o10: ${{ steps.p.outputs.o10 }}
      o11: ${{ steps.p.outputs.o11 }}
      o12: ${{ steps.p.outputs.o12 }}
      o13: ${{ steps.p.outputs.o13 }}
      o14: ${{ steps.p.outputs.o14 }}
      o15: ${{ steps.p.outputs.o15 }}
      o16: ${{ steps.p.outputs.o16 }}
      o17: ${{ steps.p.outputs.o17 }}
      o18: ${{ steps.p.outputs.o18 }}
      o19: ${{ steps.p.outputs.o19 }}
      o20: ${{ steps.p.outputs.o20 }}
      o21: ${{ steps.p.outputs.o21 }}
      o22: ${{ steps.p.outputs.o22 }}
      o23: ${{ steps.p.outputs.o23 }}
    steps:
      - id: p
        run: |
          gh release download v0.8.0 --repo "$GITHUB_REPOSITORY" --pattern dist-manifest.json
          python3 - <<'PY'
          import json, os
          m = json.load(open("dist-manifest.json"))
          mode = os.environ["MODE"]
          start, step = int(os.environ["START"]), int(os.environ["STEP"])
          if mode == "manifest":
              units = json.dumps(m, indent=1).splitlines()
          elif mode == "body":
              units = m["announcement_github_body"].splitlines()
          elif mode == "candidates":  # one candidate string per output, step=1
              units = json.loads(os.environ["CANDIDATES"])
          else:  # bodyline: characters of one body line, 50%-overlapping windows
              text = m["announcement_github_body"].splitlines()[int(os.environ["LINE"])]
              units = None
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              for i in range(24):
                  lo = start + i * step
                  if units is None:
                      chunk = text[lo:lo + 2 * step]  # overlap so no substring is split
                  else:
                      chunk = "\n".join(units[lo:lo + step])
                  f.write(f"o{i:02d}<<PROBE_EOF\nunits {lo}..{lo+step-1}\n{chunk}\nPROBE_EOF\n")
          PY
  consume:
    needs: probe
    runs-on: ubuntu-latest
    steps:
      - env:
          ALL: ${{ toJson(needs.probe.outputs) }}
        run: echo "received ${#ALL} bytes of outputs"
