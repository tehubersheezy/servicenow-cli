# TEMPORARY forensics — delete after use.
#
# Round 1 established the mask is a runner REGEX, not a secret value: the string
# "Bearer xyzzy", invented on the spot and present in no secret, was withheld,
# while "bearer auth" (lowercase) and "Carrier auth" passed.
#
# Round 2 pins the boundary. The one that decides whether a changelog author can
# escape by wrapping the line is `nl`: "Bearer" at end-of-line, its word on the
# next. If that is withheld too, the regex spans newlines and wrapping is no
# defense.
name: mask-forensics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  emit:
    runs-on: ubuntu-latest
    outputs:
      c00: ${{ steps.e.outputs.c00 }}
      c01: ${{ steps.e.outputs.c01 }}
      c02: ${{ steps.e.outputs.c02 }}
      c03: ${{ steps.e.outputs.c03 }}
      c04: ${{ steps.e.outputs.c04 }}
      c05: ${{ steps.e.outputs.c05 }}
      c06: ${{ steps.e.outputs.c06 }}
      c07: ${{ steps.e.outputs.c07 }}
      c08: ${{ steps.e.outputs.c08 }}
      nl: ${{ steps.e.outputs.nl }}
    steps:
      - id: e
        run: |
          i=0
          while IFS= read -r cand; do
            printf 'c%02d=%s\n' "$i" "$cand" >> "$GITHUB_OUTPUT"
            i=$((i + 1))
          done <<'CANDS'
          Bearer x
          Bearer-auth
          Bearer.auth
          Bearer  auth
          Bearer 123
          Bearers auth
          Bearer_auth
          MyBearer auth
          Bearer, auth
          CANDS

          # The wrapped-changelog case: a newline between the word and its token.
          {
            echo 'nl<<EOF'
            echo 'a line ending in Bearer'
            echo 'auth starting the next'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  consume:
    needs: emit
    runs-on: ubuntu-latest
    steps:
      - name: Where exactly is the boundary?
        env:
          ALL: ${{ toJson(needs.emit.outputs) }}
        run: |
          names=(
            "Bearer x        (single char)"
            "Bearer-auth     (hyphen, no space)"
            "Bearer.auth     (dot)"
            "Bearer  auth    (two spaces)"
            "Bearer 123      (digits)"
            "Bearers auth    (Bearer+s = different word)"
            "Bearer_auth     (underscore)"
            "MyBearer auth   (no word boundary before)"
            "Bearer, auth    (comma)"
          )
          for i in $(seq 0 8); do
            key=$(printf 'c%02d' "$i")
            val=$(printf '%s' "$ALL" | jq -r --arg k "$key" '.[$k] // ""')
            [ -z "$val" ] && printf '%-2s WITHHELD  %s\n' "$i" "${names[$i]}" \
                          || printf '%-2s passed    %s\n' "$i" "${names[$i]}"
          done
          nl=$(printf '%s' "$ALL" | jq -r '.nl // ""')
          [ -z "$nl" ] && echo "nl WITHHELD  'Bearer' \\n 'auth'  <-- WRAPPING IS NO ESCAPE" \
                       || echo "nl passed    'Bearer' \\n 'auth'  <-- a newline breaks the match"
