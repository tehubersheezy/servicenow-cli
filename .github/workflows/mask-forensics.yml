# TEMPORARY forensics — delete after use.
#
# HOMEBREW_TAP_TOKEN is now provably a single 93-char line, yet a job output
# containing "Bearer auth" is still withheld. So the mask is NOT coming from that
# secret, and the standing theory ("the secret was pasted with junk prose lines")
# is wrong.
#
# Competing hypothesis: the runner masks `Bearer <something>` by *pattern*, via
# the CredScan regexes it registers alongside real secrets. If so, the phrase ban
# is a permanent property of GitHub Actions, not something a rotation can fix.
#
# The discriminator is `Bearer xyzzy`: that string cannot be inside any secret,
# so if it is withheld too, it is a regex, not a value.
name: mask-forensics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  emit:
    runs-on: ubuntu-latest
    outputs:
      c00: ${{ steps.e.outputs.c00 }}
      c01: ${{ steps.e.outputs.c01 }}
      c02: ${{ steps.e.outputs.c02 }}
      c03: ${{ steps.e.outputs.c03 }}
      c04: ${{ steps.e.outputs.c04 }}
      c05: ${{ steps.e.outputs.c05 }}
      c06: ${{ steps.e.outputs.c06 }}
      c07: ${{ steps.e.outputs.c07 }}
      c08: ${{ steps.e.outputs.c08 }}
      c09: ${{ steps.e.outputs.c09 }}
      c10: ${{ steps.e.outputs.c10 }}
      c11: ${{ steps.e.outputs.c11 }}
    steps:
      - id: e
        run: |
          i=0
          while IFS= read -r cand; do
            printf 'c%02d=%s\n' "$i" "$cand" >> "$GITHUB_OUTPUT"
            i=$((i + 1))
          done <<'CANDS'
          Bearer auth
          Bearer token
          Bearer tokens
          Bearer xyzzy
          Bearer
          bearer auth
          BEARER AUTH
          auth
          token
          Carrier auth
          the Bearer auth line
          Authorization: Bearer abc123
          CANDS

  consume:
    needs: emit
    runs-on: ubuntu-latest
    steps:
      - name: Which candidates survived a job output?
        env:
          ALL: ${{ toJson(needs.emit.outputs) }}
        run: |
          # Index → candidate, kept here because the runner would mask the names
          # in its own log if we printed them from the emit job.
          names=(
            "Bearer auth"
            "Bearer token"
            "Bearer tokens"
            "Bearer xyzzy   <-- DISCRIMINATOR: cannot be in any secret"
            "Bearer"
            "bearer auth    (lowercase)"
            "BEARER AUTH    (uppercase)"
            "auth"
            "token"
            "Carrier auth   <-- CONTROL: should always survive"
            "the Bearer auth line   (embedded in prose)"
            "Authorization: Bearer abc123"
          )
          for i in $(seq 0 11); do
            key=$(printf 'c%02d' "$i")
            val=$(printf '%s' "$ALL" | jq -r --arg k "$key" '.[$k] // ""')
            if [ -z "$val" ]; then
              printf '%-2s WITHHELD  %s\n' "$i" "${names[$i]}"
            else
              printf '%-2s passed    %s\n' "$i" "${names[$i]}"
            fi
          done
